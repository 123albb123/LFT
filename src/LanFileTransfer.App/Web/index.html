<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="color-scheme" content="light">
  <title>内网文件传输工具</title>
  <link rel="stylesheet" href="/assets/app.css">
</head>
<body>
  <main class="shell">
    <header class="hero">
      <div>
        <p class="eyebrow">LOCAL FILE DROP</p>
        <h1>内网文件传输工具</h1>
        <p class="subtitle">同一局域网内，无需登录，快速收发文件。</p>
      </div>
      <span id="connectionBadge" class="badge online">已连接</span>
    </header>

    <section id="uploadCard" class="card upload-card">
      <div class="section-title">
        <div><h2>上传文件</h2><p id="uploadHint">文件将保存到共享目录</p></div>
        <button id="chooseButton" class="button primary" type="button">选择文件</button>
        <input id="fileInput" type="file" multiple hidden>
      </div>
      <button id="dropZone" class="drop-zone" type="button">
        <span class="drop-icon">＋</span>
        <strong>拖放文件到这里</strong>
        <small>也可以点击选择；文件会逐个流式上传</small>
      </button>
      <div id="transferPanel" class="transfer-panel" hidden>
        <div class="transfer-label"><span id="transferName">正在准备…</span><strong id="transferPercent">0%</strong></div>
        <div class="progress"><i id="transferBar"></i></div>
        <p id="transferStatus" class="transfer-status"></p>
      </div>
    </section>

    <section class="card files-card">
      <div class="section-title">
        <div><h2>共享文件</h2><p><span id="fileCount">0</span> 个文件</p></div>
        <button id="refreshButton" class="button ghost" type="button">刷新</button>
      </div>
      <div id="emptyState" class="empty-state" hidden>
        <span>⌁</span><strong>还没有文件</strong><p>从电脑端添加，或在上方上传。</p>
      </div>
      <div id="fileList" class="file-list" aria-live="polite"></div>
    </section>

    <footer>仅供当前局域网使用 · 请勿分享敏感文件</footer>
  </main>
  <div id="toast" class="toast" role="status" aria-live="polite"></div>
  <script src="/assets/app.js" defer></script>
</body>
</html>
